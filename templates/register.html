{% extends 'base.html' %}
{% block title %}Register · Smart Education{% endblock %}
{% block content %}
<div class="auth-wrap row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card glass-card border-0 shadow-lg">
      <div class="card-body p-4 p-lg-5">
        <h2 class="fw-bold mb-2">Create account</h2>
        <p class="text-secondary mb-4">One account. The whole dashboard.</p>
        <form method="POST" class="vstack gap-3">
          <div>
            <label class="form-label">Username</label>
            <input type="text" class="form-control form-control-lg" name="username" required>
          </div>
          <div>
            <label class="form-label">Email</label>
            <input type="email" class="form-control form-control-lg" name="email" required>
          </div>
          <div>
            <label class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" name="password" required>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Register</button>
        </form>
        <div class="mt-4 text-center text-secondary">
          Already registered? <a href="{{ url_for('login') }}">Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
