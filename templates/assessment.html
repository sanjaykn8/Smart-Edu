{% extends 'base.html' %}
{% block title %}Assessment · Smart Education{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="card glass-card border-0 shadow-lg">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
          <div>
            <h1 class="h3 fw-bold mb-1">Assessment</h1>
            <div class="text-secondary">{{ course }} · {{ level }} · {{ username }}</div>
          </div>
          <span class="badge text-bg-secondary-subtle text-secondary-emphasis">Progress snapshot</span>
        </div>

        <p class="text-secondary mb-4">Enter the actual numbers. The app will do the math and store the result.</p>

        <form method="POST" class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Age</label>
            <input type="number" class="form-control form-control-lg" name="age" min="10" max="100" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Education</label>
            <select class="form-select form-select-lg" name="education_level" required>
              {% for item in education_levels %}
                <option value="{{ item }}">{{ item }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Learning style</label>
            <select class="form-select form-select-lg" name="learning_style" required>
              {% for item in learning_styles %}
                <option value="{{ item }}">{{ item }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Time spent on videos (hours)</label>
            <input type="number" step="0.1" class="form-control form-control-lg" name="time_spent" min="0" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Quiz score</label>
            <input type="number" class="form-control form-control-lg" name="quiz_score" min="0" max="100" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Final exam score</label>
            <input type="number" class="form-control form-control-lg" name="exam_score" min="0" max="100" required>
          </div>
          <div class="col-12 mt-2">
            <button type="submit" class="btn btn-primary btn-lg px-4">Save assessment</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
