<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Edu</title>
    <meta name="description" content="A smart education platform with personalized learning recommendations and progress tracking." />
    <meta name="author" content="Smart Edu" />

    <meta property="og:title" content="Smart Edu" />
    <meta property="og:description" content="A smart education platform with personalized learning recommendations and progress tracking." />

    <meta property="og:image" content="/placeholder.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/placeholder.svg" />
  </head>

  <body>
    <script>
      try {
        const raw = localStorage.getItem('smart-edu-store');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (parsed?.state?.darkMode) document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
